name: Build Geode Mod

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build git python3 curl

      - name: Clone Geode mod template (IMPORTANT FIX)
        run: |
          git clone --recursive https://github.com/geode-sdk/mods-template.git geode-mod

      - name: Move project into template
        run: |
          cp -r . geode-mod/mods/NoOrbsMod

      - name: Configure CMake with Geode toolchain
        run: |
          cmake -B geode-mod/build -G Ninja \
            -S geode-mod \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build mod
        run: |
          cmake --build geode-mod/build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: NoOrbsMod
          path: geode-mod/build/*
