name: Build Geode Mod

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build git

      - name: Clone Geode SDK
        run: |
          git clone --recursive https://github.com/geode-sdk/geode.git

      - name: Configure
        run: |
          cmake -B build -G Ninja \
            -DGEODE_SDK=geode

      - name: Build
        run: |
          cmake --build build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: NoOrbsMod
          path: build/*.so
