name: Build Geode Mod

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build git wget unzip

      - name: Download Geode CLI (FIXED VERSION)
        run: |
          wget https://github.com/geode-sdk/cli/releases/download/v3.7.3/geode-cli-linux
          chmod +x geode-cli-linux
          sudo mv geode-cli-linux /usr/local/bin/geode

      - name: Setup SDK
        run: |
          geode sdk install

      - name: Configure
        run: |
          geode build configure

      - name: Build
        run: |
          geode build build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: NoOrbsMod
          path: build/*
