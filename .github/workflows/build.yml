name: Build Geode Mod

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build git wget unzip build-essential

      - name: Clone Geode SDK
        run: |
          git clone --recursive https://github.com/geode-sdk/geode.git geode-sdk

      - name: Configure CMake
        run: |
          cmake -B build -G Ninja \
            -DGEODE_SDK=geode-sdk \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build mod
        run: |
          cmake --build build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: GeodeMod
          path: |
            build/
