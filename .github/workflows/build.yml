name: Geode Mod Debug Build

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      ACTIONS_RUNNER_DEBUG: true
      ACTIONS_STEP_DEBUG: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: System info
        run: |
          set -x
          uname -a
          whoami
          pwd
          echo "HOME=$HOME"
          echo "PATH=$PATH"

      - name: Install dependencies (verbose)
        run: |
          set -euxo pipefail
          sudo apt-get update -y
          sudo apt-get install -y cmake ninja-build git wget curl unzip

      - name: Show disk + env
        run: |
          set -euxo pipefail
          df -h
          env

      - name: Attempt Geode CLI install (DEBUG MODE)
        run: |
          set -euxo pipefail

          echo "Downloading installer..."
          curl -v https://geode-sdk.org/install.sh -o install.sh

          echo "Running installer..."
          bash -x install.sh || true

          echo "Checking install output..."
          ls -R $HOME || true
          ls -R $HOME/.local || true
          ls -R $HOME/.local/bin || true

      - name: Force PATH inspection
        run: |
          set -euxo pipefail
          echo "Before PATH fix: $PATH"
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          echo "After PATH fix: $PATH"

      - name: Locate geode binary (FULL SEARCH)
        run: |
          set -euxo pipefail

          echo "Searching system for geode..."
          find $HOME -name "geode" -type f || true
          find / -name "geode" -type f 2>/dev/null || true

      - name: Verify geode (NO HIDING ERRORS)
        run: |
          set -euxo pipefail

          which geode || true
          geode --version
          geode sdk install
          geode build configure

      - name: Build mod (FULL OUTPUT)
        run: |
          set -euxo pipefail
          geode build build

      - name: Upload artifacts (even if broken)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-build-output
          path: |
            build/
            **/*.log
