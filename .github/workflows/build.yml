name: Build Geode Mod

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build git python3

      - name: Clone build system oficial
        run: |
          git clone https://github.com/geode-sdk/build-geode-mod.git

      - name: Configure mod build
        run: |
          python3 build-geode-mod/build.py configure .

      - name: Build mod
        run: |
          python3 build-geode-mod/build.py build .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: GeodeMod
          path: |
            build/
            **/*.geode
            **/*.so
            **/*.dll
