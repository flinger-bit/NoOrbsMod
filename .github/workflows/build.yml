name: Build Geode Mod

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    name: Android64
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install NDK r27c (Clang 18, compatible with Geode 3.9.3)
        run: |
          wget -q "https://dl.google.com/android/repository/android-ndk-r27c-linux.zip" -O ndk.zip
          unzip -q ndk.zip -d "$HOME"
          echo "ANDROID_NDK_LATEST_HOME=$HOME/android-ndk-r27c" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_HOME=$HOME/android-ndk-r27c" >> "$GITHUB_ENV"

      - name: Build the mod
        uses: geode-sdk/build-geode-mod@main
        with:
          sdk: 3.9.3
          cli: latest
          bindings: geode-sdk/bindings
          bindings-ref: f79cf82866f46f9205f82e48d4c6f0e44c3222f0
          build-config: Release
          combine: true
          target: Android64

  package:
    name: Package builds
    runs-on: ubuntu-latest
    needs: [build]

    steps:
      - uses: geode-sdk/build-geode-mod/combine@main
        id: build

      - uses: actions/upload-artifact@v4
        with:
          name: Build Output
          path: ${{ steps.build.outputs.build-output }}
